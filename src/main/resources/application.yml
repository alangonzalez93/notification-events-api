spring:
  application:
    name: notification-events-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  servlet:
    context-path: /api
  shutdown: graceful

notifications:
  dispatcher:
    delay-ms: 5000
    batch-size: 100
    processing-timeout-minutes: 5
  retry:
    max-attempts: 4
    base-delay-seconds: 5
    max-delay-seconds: 60
    jitter-factor: 0.2
  webhook:
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
  async:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 500
  circuitbreaker:
    sliding-window-size: 5
    minimum-number-of-calls: 10
    failure-rate-threshold: 50
    wait-duration-seconds: 30
    permitted-calls-in-half-open: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    env:
      enabled: false
  server:
    port: 8081
    # address: 127.0.0.1  ← en producción descomentar para restringir a red interna

logging:
  level:
    root: INFO
    com.cobre.notifications: DEBUG
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
